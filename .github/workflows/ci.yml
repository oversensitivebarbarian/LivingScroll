# Full test suite — runs on every PR targeting `main` (and again on push to
# `main` as a safety net). Make the `test` job a REQUIRED status check in the
# repo's branch protection so a PR cannot merge into `main` until it passes
# (see docs/CI_SETUP.md).
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Flutter Linux desktop toolchain (the integration tests run as a Linux
      # desktop app) + Xvfb for a headless display + mesa software GL.
      - name: Install Linux build & headless-test deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            xvfb libgl1-mesa-dri

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ vars.FLUTTER_VERSION || '3.44.2' }}
          channel: stable
          cache: true

      - run: flutter --version
      - run: flutter pub get
      - run: flutter gen-l10n

      - name: Static analysis
        run: flutter analyze

      - name: Unit & widget tests
        run: flutter test test/

      # Integration tests run as a Linux desktop app under Xvfb. They are driven
      # one file at a time (a directory-wide run fails to load in this project);
      # the loop fails the job on the first failing file.
      - name: Integration tests (headless Linux desktop)
        run: |
          set -e
          for f in integration_test/*_test.dart; do
            echo "::group::$f"
            xvfb-run -a -s "-screen 0 1920x1080x24" flutter test "$f" -d linux
            echo "::endgroup::"
          done
