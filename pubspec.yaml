name: living_scroll
description: "LivingScroll — an offline-first tabletop-RPG adventure authoring and play app."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.1+1

environment:
  sdk: ^3.12.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # Localization (English, German, French, Portuguese, Spanish, Polish,
  # Chinese, Japanese) via Flutter's gen_l10n tooling.
  flutter_localizations:
    sdk: flutter
  intl: any

  # Reads the app's own version/build number (from this file's `version:`) at
  # runtime for the Settings screen's Build section.
  package_info_plus: ^8.1.2

  # Resolves the user-files root (getApplicationSupportDirectory) where the
  # Projects / Adventures / Saves / Settings directories live.
  path_provider: ^2.1.4

  # Zips a published adventure into a standard `.ls` archive (with the metadata
  # cached in the zip comment) — see services/adventure_packager.dart.
  archive: ^3.6.1

  # Decodes any supported input image and crops/scales role images (cover, NPC)
  # to their IMAGE PROFILE before saving.
  image: ^4.2.0

  # Native file pickers for the cover image and the Import-data JSON. Wrapped by
  # FilePickerService so tests can inject a fake without touching native dialogs.
  file_picker: ^8.1.2

  # Enforces a minimum window size on desktop (Linux/Windows/macOS) so the UI is
  # never resized below its verified-safe floor (see LAYOUTS/window_size).
  window_manager: ^0.4.2

  # Soundtrack playback (Play/Stop on the Soundtracks section). Wrapped by
  # AudioPlayerService so tests inject a fake instead of touching a real player.
  just_audio: ^0.9.42

  # Desktop (Linux/Windows) playback backend for just_audio, plus the bundled
  # native media libraries (libmpv) for each desktop OS. Initialised for Linux
  # and Windows in main().
  just_audio_media_kit: ^2.0.6
  media_kit_libs_linux: ^1.1.3
  media_kit_libs_windows_audio: ^1.0.9
  material_symbols_icons: ^4.2951.0
  flutter_quill: ^11.5.1

  # Lays out the adventure's scene graph for the "Mapa" (scene map) view: a
  # directed graph rendered Sugiyama-style (layered), wrapped in an
  # InteractiveViewer with a custom metro-style EdgeRenderer. See
  # widgets/scene_map/ and docs/scene_map_widget.md.
  graphview: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Drives the Navigations/ executable specs as integration tests.
  integration_test:
    sdk: flutter

  # Lets the test harness redirect the user-files root by swapping
  # PathProviderPlatform.instance (desktop path_provider bypasses channels).
  path_provider_platform_interface: ^2.1.0
  plugin_platform_interface: ^2.1.0

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# App icon generation for every platform flutter_launcher_icons supports
# (Android, iOS, macOS, Windows, web). Source art: Assets/app_icon.png (1024x1024
# master) and Assets/app_icon_foreground.png (the same art padded into the
# Android adaptive-icon safe zone) — BOTH generated from the single vector
# source of truth, Assets/icon-hires.svg, by scripts/generate_app_icons.sh
# (which also re-runs flutter_launcher_icons). Re-run that script — not
# `dart run flutter_launcher_icons` directly — whenever icon-hires.svg
# changes, then commit the regenerated PNGs.
# Linux is NOT covered by this tool — its window icon is set in
# linux/runner/my_application.cc from the bundled Assets/app_icon.png asset,
# and scripts/build_appimage.sh packages the same file as the AppImage icon.
flutter_launcher_icons:
  image_path: "Assets/app_icon.png"
  android: true
  min_sdk_android: 21
  adaptive_icon_background: "#0D3B2E"
  adaptive_icon_foreground: "Assets/app_icon_foreground.png"
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#0D3B2E"
  web:
    generate: true
    image_path: "Assets/app_icon.png"
    background_color: "#0D3B2E"
    theme_color: "#0D3B2E"
  windows:
    generate: true
    image_path: "Assets/app_icon.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "Assets/app_icon.png"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Generate localized message lookups from the ARB files in lib/l10n.
  generate: true

  # Bundled so the Linux GTK runner can load the window/taskbar icon at runtime
  # (linux/runner/my_application.cc) — flutter_launcher_icons does not cover Linux.
  assets:
    - Assets/app_icon.png

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
